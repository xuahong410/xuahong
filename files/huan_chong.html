<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滚动缓冲加载演示</title>
    <!-- 引入 Vue 和 element-ui (用于无限滚动指令) -->
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <!-- element-ui 的样式和脚本 (提供 infinite-scroll) -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }
        #app {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        h2 {
            font-weight: 400;
            color: #303133;
            border-bottom: 1px solid #ebeef5;
            padding-bottom: 12px;
            margin-top: 0;
        }
        .message-notices {
            max-height: 520px;
            overflow-y: auto;
            border: 1px solid #ebeef5;
            border-radius: 4px;
            padding: 4px 0;
            background: #fafafa;
        }
        .message-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }
        .message-item:last-child {
            border-bottom: none;
        }
        .message-item:hover {
            background: #ecf5ff;
        }
        .message-unread {
            background: #fef0f0;
            border-left: 3px solid #f56c6c;
        }
        .message-title {
            font-size: 15px;
            color: #303133;
            letter-spacing: 0.3px;
        }
        .loading-indicator {
            text-align: center;
            padding: 16px 0;
            color: #909399;
            font-size: 14px;
        }
        .no-more {
            text-align: center;
            padding: 16px 0;
            color: #c0c4cc;
            font-size: 13px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 13px;
            color: #606266;
            background: #f5f7fa;
            padding: 8px 14px;
            border-radius: 4px;
        }
        .btn-reset {
            margin-top: 14px;
            padding: 6px 18px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-reset:hover {
            background: #66b1ff;
        }
        .footer-info {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <h2>📬 消息通知 · 滚动缓冲加载</h2>
        <p style="color: #909399; font-size: 14px; margin: 0 0 16px 0;">
            向下滚动自动加载更多，模拟每次加载 10 条（共 35 条数据）
        </p>

        <!-- 父组件：一次性传入所有数据 -->
        <message-notice 
            :message-list="fullMessageList" 
            :page-size="10"
            :immediate-load="true"
            @page-loaded="onPageLoaded"
        />

        <div class="footer-info">
            <span style="color: #909399; font-size: 13px;">
                已加载 <strong>{{ loadedCount }}</strong> / {{ fullMessageList.length }} 条
            </span>
            <button class="btn-reset" @click="resetDemo">🔄 重置滚动</button>
        </div>
    </div>

    <script>
        // ---------- 子组件：MessageNotice ----------
        Vue.component('MessageNotice', {
            template: `
                <div>
                    <div 
                        v-if="hasMessages" 
                        class="message-notices" 
                        v-infinite-scroll="loadMore" 
                        infinite-scroll-distance="50"
                        infinite-scroll-immediate="false" 
                        :infinite-scroll-disabled="disabled"
                        ref="scrollContainer"
                    >
                        <div 
                            class="message-item" 
                            v-for="message in visibleMessages" 
                            :key="message.id || message.messageId"
                            :class="{ 'message-unread': message.messageStatus === '0' }"
                        >
                            <span class="message-title">{{ message.messageTitle }}</span>
                        </div>

                        <!-- 加载指示器 -->
                        <div v-if="loading" class="loading-indicator">
                            <i class="el-icon-loading"></i> 加载中...
                        </div>
                        <div v-if="!hasMore && visibleMessages.length > 0" class="no-more">
                            — 已全部加载 —
                        </div>
                    </div>
                    <div v-else style="padding: 40px 0; text-align: center; color: #c0c4cc;">
                        暂无消息
                    </div>
                </div>
            `,
            props: {
                messageList: {
                    type: Array,
                    default: () => []
                },
                pageSize: {
                    type: Number,
                    default: 10
                },
                immediateLoad: {
                    type: Boolean,
                    default: true
                }
            },
            data() {
                return {
                    loading: false,
                    currentPage: 1,
                    allMessages: [],
                    visibleMessages: []
                }
            },
            computed: {
                hasMessages() {
                    return this.visibleMessages.length > 0
                },
                hasMore() {
                    return this.visibleMessages.length < this.allMessages.length
                },
                totalPages() {
                    if (this.allMessages.length === 0) return 0
                    return Math.ceil(this.allMessages.length / this.pageSize)
                },
                disabled() {
                    return this.loading || !this.hasMore
                }
            },
            watch: {
                messageList: {
                    immediate: true,
                    handler(newList) {
                        this.allMessages = newList || []
                        this.resetLoad()
                    }
                }
            },
            mounted() {
                if (this.immediateLoad && this.allMessages.length > 0) {
                    this.loadPage(1)
                }
            },
            methods: {
                loadMore() {
                    if (this.loading || !this.hasMore) return
                    this.loading = true
                    // 模拟异步加载延迟
                    setTimeout(() => {
                        this.currentPage++
                        this.loadPage(this.currentPage)
                        this.loading = false
                    }, 300)
                },
                loadPage(page) {
                    if (this.allMessages.length === 0) {
                        this.visibleMessages = []
                        return
                    }
                    const startIndex = (page - 1) * this.pageSize
                    const endIndex = startIndex + this.pageSize
                    const pageData = this.allMessages.slice(startIndex, endIndex)

                    if (page === 1) {
                        this.visibleMessages = pageData
                    } else {
                        this.visibleMessages = [...this.visibleMessages, ...pageData]
                    }

                    this.$emit('page-loaded', {
                        page,
                        totalPages: this.totalPages,
                        loadedCount: this.visibleMessages.length,
                        totalCount: this.allMessages.length
                    })
                },
                resetLoad() {
                    this.currentPage = 1
                    this.visibleMessages = []
                    this.loading = false
                    if (this.immediateLoad && this.allMessages.length > 0) {
                        this.loadPage(1)
                    }
                }
            }
        })

        // ---------- 根实例（父组件） ----------
        new Vue({
            el: '#app',
            data: {
                loadedCount: 0,
                // 模拟 35 条消息数据
                fullMessageList: Array.from({ length: 35 }, (_, i) => ({
                    id: i + 1,
                    messageTitle: `📌 系统通知 #${i + 1}：这是一条示例消息，用于演示滚动缓冲加载效果。`,
                    messageStatus: i % 5 === 0 ? '0' : '1'   // 每5条有一条未读
                }))
            },
            methods: {
                onPageLoaded(info) {
                    this.loadedCount = info.loadedCount
                    console.log(`[父组件] 加载第 ${info.page}/${info.totalPages} 页，共 ${info.loadedCount}/${info.totalCount} 条`)
                },
                resetDemo() {
                    // 强制刷新子组件状态：重新赋值触发 watch
                    const copy = [...this.fullMessageList]
                    this.fullMessageList = []
                    this.$nextTick(() => {
                        this.fullMessageList = copy
                    })
                    this.loadedCount = 0
                }
            }
        })
    </script>
</body>
</html>
